databases:
  - name: sgeg-coach-db
    databaseName: sgeg_coach
    user: sgeg
    plan: starter       # $7/mo — 1GB Postgres, daily backups

services:
  - type: web
    name: sgeg-education-coach
    runtime: docker
    region: frankfurt
    plan: starter       # $7/mo — no sleep, always on
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sgeg-coach-db
          property: connectionString
      - key: CANVAS_BASE_URL
        sync: false
      - key: CANVAS_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: LTI_CLIENT_ID
        sync: false
      - key: LTI_DEPLOYMENT_ID
        sync: false
      - key: LTI_SECRET_KEY
        sync: false
      - key: LTI_DEV_MODE
        value: "false"
      - key: APP_URL
        value: "https://savinggraceeducationaicoach.co.za"
      # SGEG Help Desk connection — escalated tickets open in JS Help Desk.
      - key: TICKET_API_URL
        value: "https://www.savinggraceeducation.co.za/wp-json/sgeg/v1/tickets"
      - key: TICKET_API_KEY
        sync: false   # set this secret in the AI-buddy Render dashboard = your SGEG connector key
