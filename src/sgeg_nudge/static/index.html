<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGEG Education Coach</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="buddy-brand">
        <div class="buddy-avatar" aria-hidden="true">
          <!-- Coach face: navy circle · teal cap bar (SGEG E-shape) · orange eyes (SGEG dot) · white smile -->
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="22" cy="22" r="21" fill="#0A2240"/>
            <rect x="8" y="10" width="28" height="6" rx="3" fill="#007A87"/>
            <circle cx="16" cy="24" r="3" fill="#F59E0B"/>
            <circle cx="28" cy="24" r="3" fill="#F59E0B"/>
            <path d="M14 32 Q22 37 30 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1 class="buddy-name">Education Coach</h1>
          <p class="buddy-sub" id="course-label">Loading…</p>
        </div>
      </div>
      <div class="header-right">
        <span class="grade-badge" id="grade-badge"></span>
      </div>
    </div>
  </header>

  <!-- Chat window -->
  <main class="chat-window" id="chat-window" role="log" aria-live="polite" aria-label="Chat messages">
    <div class="chat-intro" id="chat-intro">
      <div class="intro-avatar" aria-hidden="true">
        <!-- Large intro avatar: pale teal bg · teal cap bar · navy eyes w/ orange pupils · navy smile -->
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="21" fill="#E8F4F6"/>
          <rect x="8" y="10" width="28" height="6" rx="3" fill="#007A87"/>
          <circle cx="16" cy="24" r="3" fill="#0A2240"/>
          <circle cx="28" cy="24" r="3" fill="#0A2240"/>
          <circle cx="16.9" cy="23.1" r="1.1" fill="#F59E0B"/>
          <circle cx="28.9" cy="23.1" r="1.1" fill="#F59E0B"/>
          <path d="M14 32 Q22 37 30 32" stroke="#0A2240" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="intro-greeting" id="intro-greeting">Hi there! I'm your Education Coach</p>
      <p class="intro-text">I can check your grades, remind you about assignments, and help you find your lessons and videos in Canvas.</p>
    </div>
  </main>

  <!-- Quick actions bar -->
  <div class="quick-actions" id="quick-actions">
    <button class="chip" data-msg="What are my grades?"><svg class="chip-svg" width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1" y="8" width="3" height="6" rx=".8" fill="#007A87"/><rect x="6" y="5" width="3" height="9" rx=".8" fill="#007A87"/><rect x="11" y="2" width="3" height="12" rx=".8" fill="#0A2240"/></svg> My grades</button>
    <button class="chip" data-msg="What assignments do I have coming up?"><svg class="chip-svg" width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="12" height="14" rx="2" stroke="#0A2240" stroke-width="1.2"/><line x1="5" y1="5.5" x2="11" y2="5.5" stroke="#0A2240" stroke-width="1"/><line x1="5" y1="8" x2="11" y2="8" stroke="#0A2240" stroke-width="1"/><line x1="5" y1="10.5" x2="9" y2="10.5" stroke="#0A2240" stroke-width="1"/><circle cx="3.5" cy="5.5" r=".8" fill="#007A87"/><circle cx="3.5" cy="8" r=".8" fill="#007A87"/><circle cx="3.5" cy="10.5" r=".8" fill="#007A87"/></svg> My assignments</button>
    <button class="chip" data-msg="Show me the course modules and lessons."><svg class="chip-svg" width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M1 5.5a2 2 0 012-2h2.5a2 2 0 011.42.59l.59.59A2 2 0 009.91 5H13a2 2 0 012 2v5a2 2 0 01-2 2H3a2 2 0 01-2-2V5.5z" fill="#007A87" opacity=".9"/></svg> Course content</button>
    <button class="chip chip-escalate" id="btn-escalate"><svg class="chip-svg" width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 2v5M6 3.5v4M4 5v3M10 3.5v4M12 5v3" stroke="#B91C1C" stroke-width="1.2" stroke-linecap="round"/><rect x="2.5" y="9" width="11" height="3.5" rx="1.5" fill="#B91C1C"/></svg> Get Support</button>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea
      id="message-input"
      class="message-input"
      placeholder="Ask me anything about your course…"
      rows="1"
      aria-label="Your message"
      maxlength="2000"
    ></textarea>
    <button class="send-btn" id="send-btn" aria-label="Send message" disabled>
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Escalation modal -->
  <div class="modal-overlay" id="escalate-modal" role="dialog" aria-modal="true" aria-label="Get Support" hidden>
    <div class="modal">
      <h2>Get Support</h2>
      <p>Let us know what you need help with and the SGEG support team will follow up with you.</p>
      <textarea id="escalate-msg" class="escalate-textarea" placeholder="What do you need help with? (optional)" rows="3" maxlength="500"></textarea>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-confirm">Send to support</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
