name: Build & Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 947792709457.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY: sgeg-education-coach
  APP_RUNNER_ARN: arn:aws:apprunner:eu-west-1:947792709457:service/sgeg-education-coach/60a8d95a404342778d64d850b92655f4
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to App Runner
        run: |
          # Wait until service is in a deployable state (up to 10 minutes)
          for i in $(seq 1 20); do
            STATUS=$(aws apprunner describe-service \
              --service-arn ${{ env.APP_RUNNER_ARN }} \
              --region ${{ env.AWS_REGION }} \
              --query Service.Status --output text)
            echo "App Runner status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              break
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "DELETED" ]; then
              echo "Service is in unrecoverable state: $STATUS"
              exit 1
            fi
            sleep 30
          done

          aws apprunner start-deployment \
            --service-arn ${{ env.APP_RUNNER_ARN }} \
            --region ${{ env.AWS_REGION }}
